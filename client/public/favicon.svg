<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#4f46e5"/>
  <!-- Pen body (diagonal, tip at bottom-left) -->
  <g transform="rotate(-45, 16, 16)">
    <rect x="12" y="7" width="8" height="14" rx="1.5" fill="white"/>
    <!-- Pen tip (triangle) -->
    <polygon points="12,21 20,21 16,26" fill="white"/>
    <!-- Eraser end -->
    <rect x="12" y="5" width="8" height="3" rx="1" fill="#94a3b8"/>
  </g>
  <!-- Broadcast arcs from pen tip area -->
  <g fill="none" stroke="#f59e0b" stroke-linecap="round">
    <path d="M10,22 Q8,18 10,14" stroke-width="1.5"/>
    <path d="M8,24 Q5,18 8,12" stroke-width="1.5"/>
    <path d="M6,26 Q2,18 6,10" stroke-width="1.5"/>
  </g>
</svg>
