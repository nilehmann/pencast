<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
        />
        <title>Pencast</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }
            body,
            html {
                margin: 0;
                padding: 0;
                height: 100%;
                /* Prevent Safari's magnifier, text-selection highlight, and
                   long-press context menu across the entire app. These are
                   handled at the WebKit rendering layer before any JS or
                   pointer-event handlers run, so CSS on the root is the only
                   reliable suppression point. */
                -webkit-user-select: none;
                user-select: none;
                -webkit-touch-callout: none;
            }
            #app {
                height: 100%;
            }
        </style>
    </head>
    <body>
        <div id="app"></div>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
